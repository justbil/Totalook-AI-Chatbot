<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Totalook — Your Total Beauty</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,1,0&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --rose:       #e8a4a4;
      --rose-deep:  #c97b7b;
      --gold:       #d4a574;
      --blush:      #f5e6e6;
      --cream:      #fdf8f5;
      --dark:       #2a1a1a;
      --mid:        #6b4545;
      --soft:       #b08080;
      --white:      #ffffff;
      --shadow:     0 8px 40px rgba(180,100,100,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--dark);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px; right: -200px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(232,164,164,0.2) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -150px; left: -150px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(212,165,116,0.15) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* HEADER */
    header {
      background: rgba(253,248,245,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(232,164,164,0.2);
      padding: 0 1.5rem;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: relative; z-index: 10;
      flex-shrink: 0;
    }

    .header-left { display: flex; align-items: center; gap: 0.75rem; }

    .avatar {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--rose-deep), var(--rose));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      box-shadow: 0 2px 12px rgba(201,123,123,0.3);
    }

    .header-info .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem; font-weight: 600;
      color: var(--dark); line-height: 1.2;
    }
    .header-info .name span { color: var(--rose-deep); font-style: italic; }
    .header-info .status {
      display: flex; align-items: center; gap: 0.3rem;
      font-size: 0.72rem; color: var(--soft);
    }
    .online-dot {
      width: 6px; height: 6px;
      background: #6bbf8a; border-radius: 50%;
      animation: pulse 2s infinite;
    }
    .header-chip {
      background: var(--blush);
      border: 1px solid rgba(232,164,164,0.3);
      border-radius: 50px;
      padding: 0.3rem 0.9rem;
      font-size: 0.72rem; color: var(--rose-deep);
      font-weight: 500; letter-spacing: 0.03em;
    }

    /* QUICK ACTIONS */
    .quick-actions {
      padding: 0.6rem 1.5rem;
      display: flex; gap: 0.5rem;
      background: rgba(253,248,245,0.8);
      border-bottom: 1px solid rgba(232,164,164,0.1);
      position: relative; z-index: 9;
      flex-shrink: 0;
      overflow-x: auto;
    }
    .quick-actions::-webkit-scrollbar { display: none; }

    .quick-btn {
      background: white;
      border: 1.5px solid rgba(232,164,164,0.25);
      border-radius: 50px;
      padding: 0.35rem 0.9rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.76rem; color: var(--mid);
      cursor: pointer; transition: all 0.2s;
      white-space: nowrap;
    }
    .quick-btn:hover {
      background: var(--blush);
      border-color: var(--rose);
      color: var(--rose-deep);
      transform: translateY(-1px);
    }

    /* CHAT AREA */
    .chat-area {
      flex: 1; overflow-y: auto;
      padding: 1.25rem 1.5rem;
      display: flex; flex-direction: column; gap: 0.85rem;
      position: relative; z-index: 1;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb {
      background: rgba(232,164,164,0.3); border-radius: 4px;
    }

    .date-divider {
      text-align: center; font-size: 0.7rem; color: var(--soft);
      display: flex; align-items: center; gap: 0.75rem; margin: 0.25rem 0;
    }
    .date-divider::before, .date-divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(232,164,164,0.2);
    }

    .msg {
      display: flex; gap: 0.6rem; align-items: flex-end;
      animation: fadeUp 0.3s ease; max-width: 82%;
    }
    .msg.user { flex-direction: row-reverse; align-self: flex-end; }
    .msg.bot  { align-self: flex-start; }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: linear-gradient(135deg, var(--rose-deep), var(--rose));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(201,123,123,0.2);
    }

    .msg-content { display: flex; flex-direction: column; gap: 0.15rem; }
    .msg.user .msg-content { align-items: flex-end; }

    .msg-bubble {
      padding: 0.7rem 1rem;
      border-radius: 18px;
      font-size: 0.875rem; line-height: 1.65;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg.bot .msg-bubble {
      background: white;
      border: 1px solid rgba(232,164,164,0.15);
      border-bottom-left-radius: 4px; color: var(--dark);
      box-shadow: 0 2px 12px rgba(180,100,100,0.06);
    }
    .msg.user .msg-bubble {
      background: linear-gradient(135deg, var(--rose-deep), var(--rose));
      border-bottom-right-radius: 4px; color: white;
      box-shadow: 0 4px 15px rgba(201,123,123,0.3);
    }
    .msg-time { font-size: 0.66rem; color: var(--soft); padding: 0 0.25rem; }

    /* Typing */
    .typing-wrap {
      display: flex; gap: 0.6rem; align-items: flex-end;
      align-self: flex-start; animation: fadeUp 0.3s ease;
    }
    .typing {
      background: white;
      border: 1px solid rgba(232,164,164,0.15);
      border-radius: 18px; border-bottom-left-radius: 4px;
      padding: 0.8rem 1rem;
      display: flex; gap: 4px; align-items: center;
      box-shadow: 0 2px 12px rgba(180,100,100,0.06);
    }
    .typing span {
      width: 7px; height: 7px; background: var(--rose);
      border-radius: 50%; animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    /* INPUT AREA */
    .input-area {
      padding: 0.85rem 1.5rem;
      background: rgba(253,248,245,0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(232,164,164,0.15);
      display: flex; gap: 0.75rem; align-items: center;
      position: relative; z-index: 10; flex-shrink: 0;
    }

    .input-wrap {
      flex: 1; display: flex; align-items: center;
      background: white;
      border: 1.5px solid rgba(176,128,128,0.25);
      border-radius: 50px;
      padding: 0.1rem 0.5rem 0.1rem 1.25rem;
      transition: all 0.2s;
    }
    .input-wrap:focus-within {
      border-color: var(--rose);
      box-shadow: 0 0 0 3px rgba(232,164,164,0.12);
    }

    #chatInput {
      flex: 1; border: none; outline: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; color: var(--dark);
      padding: 0.65rem 0;
    }
    #chatInput::placeholder { color: rgba(176,128,128,0.6); }

    .btn-send {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--rose-deep), var(--rose));
      border: none; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: white; transition: all 0.2s; flex-shrink: 0;
      box-shadow: 0 2px 10px rgba(201,123,123,0.3);
    }
    .btn-send:hover { transform: scale(1.08); box-shadow: 0 4px 15px rgba(201,123,123,0.4); }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .material-symbols-rounded { font-size: 1.1em; vertical-align: middle; }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <div class="avatar">🌸</div>
    <div class="header-info">
      <div class="name">Total<span>ook</span></div>
      <div class="status">
        <span class="online-dot"></span>
        Tola siap membantu
      </div>
    </div>
  </div>
  <div class="header-chip">✦ Salon Kecantikan</div>
</header>

<!-- QUICK ACTIONS -->
<div class="quick-actions">
  <button class="quick-btn" onclick="quickSend('Apa saja layanan yang tersedia?')">💆 Lihat Layanan</button>
  <button class="quick-btn" onclick="quickSend('Saya ingin booking layanan salon')">📅 Booking</button>
  <button class="quick-btn" onclick="quickSend('Berapa harga semua layanan?')">💰 Cek Harga</button>
  <button class="quick-btn" onclick="quickSend('Jadwal apa yang masih tersedia hari ini?')">🕐 Cek Jadwal</button>
  <button class="quick-btn" onclick="quickSend('Saya ingin cek status booking saya')">🔖 Status Booking</button>
</div>

<!-- CHAT AREA -->
<div class="chat-area" id="chatArea">
  <div class="date-divider">Hari ini</div>
  </div>;
  
<!-- INPUT -->
<div class="input-area">
  <div class="input-wrap">
    <input type="text" id="chatInput"
      placeholder="Ketik pesanmu di sini..."
      onkeydown="if(event.key==='Enter'){ event.preventDefault(); sendChat(); }" />
  </div>
  <button class="btn-send" id="btnSend" onclick="sendChat()">
    <span class="material-symbols-rounded">send</span>
  </button>
</div>

<script>
  const API = 'http://localhost:3000';
  let conversationHistory = [];

  function getTime() {
    return new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
  }

  function scrollBottom() {
    const area = document.getElementById('chatArea');
    area.scrollTop = area.scrollHeight;
  }

  function escapeHtml(text) {
    return String(text)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function formatText(text) {
    text = escapeHtml(text);
    text = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
    text = text.replace(/\n/g, '<br/>');
    return text;
  }

  function addMsg(text, role = 'bot') {
    const area = document.getElementById('chatArea');
    const div  = document.createElement('div');
    div.className = `msg ${role}`;

    if (role === 'bot') {
      div.innerHTML = `
        <div class="msg-avatar">🌸</div>
        <div class="msg-content">
          <div class="msg-bubble">${formatText(text)}</div>
          <div class="msg-time">${getTime()}</div>
        </div>`;
    } else {
      div.innerHTML = `
        <div class="msg-content">
          <div class="msg-bubble">${escapeHtml(text)}</div>
          <div class="msg-time">${getTime()}</div>
        </div>`;
    }

    area.appendChild(div);
    scrollBottom();
  }

  function showTyping() {
    const area = document.getElementById('chatArea');
    const div  = document.createElement('div');
    div.className = 'typing-wrap'; div.id = 'typing';
    div.innerHTML = `
      <div class="msg-avatar">🌸</div>
      <div class="typing"><span></span><span></span><span></span></div>`;
    area.appendChild(div);
    scrollBottom();
  }

  function hideTyping() { document.getElementById('typing')?.remove(); }

  async function sendChat() {
    const input = document.getElementById('chatInput');
    const btn   = document.getElementById('btnSend');
    const msg   = input.value.trim();
    if (!msg) return;

    addMsg(msg, 'user');
    input.value = '';
    btn.disabled = true;
    showTyping();

    try {
      const res  = await fetch(`${API}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, history: conversationHistory })
      });
      const json = await res.json();
      hideTyping();

      if (!res.ok) {
        const errText = json.error ? `${json.error}${json.detail ? ' - ' + json.detail : ''}` : 'Terjadi kesalahan server';
        addMsg(`Maaf, gagal memproses permintaan: ${errText} 🙏`);
      } else {
        const botReply = json.success && json.response ? json.response : 'Maaf, terjadi kesalahan. Coba lagi ya! 🙏';
        conversationHistory.push({ role: 'user', content: msg});
        conversationHistory.push({ role: 'assistant', content: botReply});
        addMsg(botReply);
      }
    } catch (err) {
      hideTyping();
      const errorMsg = err instanceof Error ? err.message : 'Tidak dapat terhubung ke server';
      addMsg(`Maaf, server tidak dapat dihubungi. ${errorMsg}. Pastikan server sudah berjalan ya! 🙏`);
    } finally {
      btn.disabled = false;
      input.focus();
    }
  }

  function quickSend(text) {
    document.getElementById('chatInput').value = text;
    sendChat();
  }

  document.getElementById('chatInput').focus();
</script>
</body>
</html>
